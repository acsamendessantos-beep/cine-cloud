<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineCloud - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1>Cine<span>Cloud</span></h1>
            <p>Seu catálogo pessoal de cinema.</p>
            <br>
            <form id="login-form"> <!-- Formulário de login com ID para referência no script.js -->
                <div class="input-group"> <!-- Agrupamento visual para o campo de email -->
                    <label>E-MAIL</label> <!-- Label descritivo do campo -->
                    <input type="email" id="email" placeholder="exemplo@email.com" required> <!-- Campo de email com validação obrigatória -->
                </div>
                
                <div class="input-group"> <!-- Agrupamento visual para o campo de senha -->
                    <label>SENHA</label> <!-- Label descritivo do campo -->
                    <input type="password" id="password" placeholder="Digite sua senha" required> <!-- Campo de senha oculta com validação obrigatória -->
                </div>
                
                <button type="submit" class="btn-primary">Entrar</button> <!-- Botão para enviar o formulário -->
                <button type="button" class="btn-secondary" onclick="irParaCadastro()">Criar conta</button> <!-- Botão para ir para cadastro -->
            </form>
            <a href="#" class="forgot-password">Esqueceu a senha?</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
